<style>

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Nunito', sans-serif; background: linear-gradient(160deg, #1a472a 0%, #2d6a4f 40%, #1b4332 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; user-select: none; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 15% 10%, rgba(255,220,100,0.07) 0%, transparent 50%), radial-gradient(ellipse at 85% 85%, rgba(100,255,180,0.05) 0%, transparent 50%); pointer-events: none; z-index: 0; }
#app { position: relative; z-index: 1; width: 100%; max-width: 500px; padding: 12px; }
.screen { display: none; flex-direction: column; align-items: center; }
.screen.active { display: flex; }
#title-screen { padding: 20px 0; gap: 16px; }
.title-logo { font-family: 'Fredoka One', cursive; font-size: 38px; color: #ffd166; text-shadow: 0 3px 12px rgba(0,0,0,0.5); text-align: center; line-height: 1.1; }
.title-sub { font-size: 14px; color: #b7e4c7; letter-spacing: 1.5px; text-transform: uppercase; text-align: center; }
.dino-parade-imgs { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.dino-parade-imgs img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); animation: bounce-row 1.5s ease-in-out infinite; background: white; }
.dino-parade-imgs img:nth-child(odd) { animation-delay: 0.2s; }
.dino-parade-imgs img:nth-child(3n) { animation-delay: 0.4s; }
@keyframes bounce-row { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.level-select-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
.level-btn { background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.15); border-radius: 16px; padding: 12px 6px; cursor: pointer; transition: all 0.15s; color: white; text-align: center; }
.level-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.04); }
.level-btn.locked { opacity: 0.4; cursor: default; }
.level-btn.locked:hover { transform: none; background: rgba(0,0,0,0.3); }
.level-btn .lnum { font-family: 'Fredoka One', cursive; font-size: 18px; color: #ffd166; }
.level-btn .lgoal { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 2px; line-height: 1.2; }
.level-btn .lstar { font-size: 14px; margin-top:2px; }
.section-title { font-family: 'Fredoka One', cursive; font-size: 17px; color: #b7e4c7; text-align: center; letter-spacing: 0.5px; }
.leaderboard-list { width: 100%; background: rgba(0,0,0,0.25); border-radius: 16px; border: 1.5px solid rgba(255,255,255,0.1); overflow: hidden; }
.lb-row { display: flex; align-items: center; padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,0.07); gap: 8px; font-size: 13px; color: rgba(255,255,255,0.85); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { font-family: 'Fredoka One', cursive; font-size: 16px; color: #ffd166; width: 24px; }
.lb-name { flex: 1; font-weight: 700; }
.lb-score { color: #ffd166; font-weight: 800; }
.lb-empty { color: rgba(255,255,255,0.35); font-style: italic; text-align: center; padding: 18px; width: 100%; }
#game-screen { gap: 8px; padding-bottom: 16px; }
.hud { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 8px; }
.hud-box { background: rgba(0,0,0,0.35); border: 1.5px solid rgba(255,255,255,0.13); border-radius: 14px; padding: 6px 10px; text-align: center; flex: 1; }
.hud-label { font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
.hud-value { font-family: 'Fredoka One', cursive; font-size: 18px; color: #ffd166; line-height: 1.1; }
.game-title-small { font-family: 'Fredoka One', cursive; font-size: 13px; color: #b7e4c7; text-align: center; flex: 1.6; line-height: 1.2; }
.goal-bar { width: 100%; background: rgba(0,0,0,0.25); border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.1); padding: 7px 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.goal-label { font-size: 10px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; width: 100%; }
.goal-item { display: flex; align-items: center; gap: 4px; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 3px 8px; font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.85); }
.goal-item.done { color: #52b788; }
.goal-item img { width: 22px; height: 22px; border-radius: 50%; object-fit: cover; background:white; }
.goal-item .gi-count { font-family: 'Fredoka One', cursive; }
.board-wrap { background: rgba(0,0,0,0.3); border-radius: 20px; border: 2px solid rgba(255,255,255,0.12); padding: 7px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); position: relative; width: 100%; }
.board { display: grid; gap: 3px; width: 100%; }
.cell { aspect-ratio: 1; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.12s ease; position: relative; border: 2px solid transparent; overflow: hidden; background: rgba(255,255,255,0.08); }
.cell img { width: 86%; height: 86%; object-fit: contain; pointer-events: none; }
.cell:hover { transform: scale(1.08); z-index: 2; }
.cell.selected { border-color: rgba(255,255,100,0.9); box-shadow: 0 0 0 3px rgba(255,255,100,0.35); transform: scale(1.1); z-index: 3; }
.cell.matched { animation: matched-pop 0.35s ease forwards; }
.cell.falling { animation: fall-in 0.22s ease forwards; }
.cell.hint-glow { animation: hint-pulse 0.7s ease infinite; }
@keyframes matched-pop { 0% { transform: scale(1.2); opacity: 1; } 60% { transform: scale(0.4) rotate(20deg); opacity: 0.5; } 100% { transform: scale(0); opacity: 0; } }
@keyframes fall-in { 0% { transform: translateY(-50px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
@keyframes hint-pulse { 0%,100% { box-shadow: 0 0 0 2px rgba(255,220,100,0.3); } 50% { box-shadow: 0 0 0 6px rgba(255,220,100,0.7); border-color: rgba(255,220,100,0.9); } }
.msg-bar { font-family: 'Fredoka One', cursive; font-size: 17px; color: #ffd166; text-align: center; min-height: 24px; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.btn { background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 30px; color: #b7e4c7; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; padding: 7px 15px; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.04); }
.btn.primary { background: rgba(255,209,102,0.2); border-color: rgba(255,209,102,0.5); color: #ffd166; }
.btn.primary:hover { background: rgba(255,209,102,0.35); }
.powerup-bar { display: flex; gap: 8px; align-items: center; justify-content: center; }
.pu-btn { background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 6px 10px; cursor: pointer; font-size: 12px; color: white; font-weight: 700; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
.pu-btn:hover { background: rgba(255,255,255,0.15); transform: scale(1.05); }
.pu-btn.active { border-color: #ffd166; background: rgba(255,209,102,0.2); }
.pu-btn .pu-count { background: #ffd166; color: #1a3a2a; border-radius: 10px; font-size: 10px; font-weight: 800; padding: 1px 6px; min-width: 18px; text-align: center; }
.overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.82); border-radius: 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; z-index: 20; padding: 16px; }
.overlay-title { font-family: 'Fredoka One', cursive; font-size: 30px; color: #ffd166; text-align: center; }
.overlay-sub { font-size: 14px; color: #b7e4c7; font-weight: 700; text-align: center; }
.stars-display { font-size: 30px; letter-spacing: 6px; }
.overlay-dino-img { width: 80px; height: 80px; border-radius: 50%; background:white; object-fit:cover; border: 3px solid rgba(255,209,102,0.6); }
.period-banner { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 2px; text-align: center; }
.dino-dex-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; }
.dex-card { background: rgba(0,0,0,0.25); border-radius: 12px; border: 1.5px solid rgba(255,255,255,0.12); padding: 6px 4px; text-align: center; cursor: default; }
.dex-card.unlocked { cursor: pointer; transition: transform 0.15s, background 0.15s; }
.dex-card.unlocked:hover { background: rgba(255,255,255,0.12); transform: scale(1.05); }
.dex-card img { width: 100%; aspect-ratio:1; object-fit:contain; background:white; border-radius:8px; }
.dex-card .dex-name { font-size: 10px; font-weight:800; color:#ffd166; margin-top:4px; }
.dex-card .dex-period { font-size: 8px; color: rgba(255,255,255,0.5); text-transform:uppercase; }
.dex-card.locked { opacity: 0.55; }
.dex-card.locked .dex-silhouette { width: 100%; aspect-ratio:1; background: rgba(0,0,0,0.35); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size: 28px; color: rgba(255,255,255,0.3); }
.dex-card.locked .dex-name { color: rgba(255,255,255,0.4); }

.dex-detail-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 110; padding: 20px;
}
.dex-detail-card {
  background: linear-gradient(160deg, #2d6a4f 0%, #1b4332 100%);
  border: 2px solid rgba(255,209,102,0.4);
  border-radius: 20px; padding: 20px; max-width: 360px; width: 100%;
  max-height: 85vh; overflow-y: auto;
}
.dex-detail-img { width: 90px; height: 90px; border-radius: 50%; background: white; object-fit: cover; border: 3px solid #ffd166; display: block; margin: 0 auto 10px; }
.dex-detail-name { font-family: 'Fredoka One', cursive; font-size: 22px; color: #ffd166; text-align: center; margin-bottom: 4px; }

.unlock-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.85);

}
.unlock-card-img { width: 130px; height: 130px; border-radius: 50%; background: white; object-fit: cover; border: 4px solid #ffd166; box-shadow: 0 0 30px rgba(255,209,102,0.6); animation: unlock-pop 0.5s ease; }

.unlock-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: #ffd166; text-align:center; }
.unlock-name { font-family: 'Fredoka One', cursive; font-size: 20px; color: #b7e4c7; text-align:center; }

const DINO_STORY = {"plato_plateosaurus": {"fact": "Plato lived 216\u2013199 million years ago in the Triassic Period, making him one of the very first dinosaurs ever! His name means \"flat lizard.\"", "moral": "Plato learns that growing up means saying \"no\" to secrets and \"yes\" to following the rules.", "storyTitle": "Plato's Secret Trouble", "teaser": "Plato gets pulled into a risky secret adventure by a friend \u2014 and discovers why rules are there to keep him safe."}, "shorty_coelophysis": {"fact": "Shorty was a Coelophysis, a fast theropod that walked on two legs like a long-legged bird. A real Coelophysis skull even flew to space on the MIR Space Station in 1998!", "moral": "Shorty learns that he matters, even on his unluckiest days.", "storyTitle": "Shorty's Lucky Star", "teaser": "Convinced bad luck follows him everywhere, Shorty runs away \u2014 and finds out just how loved he really is."}, "babs_barosaurus": {"fact": "Benny is a Diplodocus, one of the longest dinosaurs ever! His name means \u201cdouble-beamed\u201d because of two long bones under his tail.", "moral": "Benny learns that trying new things \u2014 even when they flop \u2014 is how you get better.", "storyTitle": "Benny's Snappy Comeback", "teaser": "Benny's new games keep going wrong, but he refuses to give up \u2014 and discovers what makes a game truly fun."}, "salty_stegosaurus": {"fact": "Salty is a Stegosaurus, an armored \"roofed lizard\" that lived in big herds during the Jurassic Period.", "moral": "Salty learns that stretching the truth can backfire \u2014 but real friends still have your back.", "storyTitle": "Salty's Fish Tale", "teaser": "Salty loves a good prank, so when real danger shows up, nobody believes him \u2014 at first."}, "iggy_iguanodon": {"fact": "Ziggy is an Iguanodon, one of the very first dinosaurs ever named! Its name means \"iguana tooth.\"", "moral": "Ziggy learns that the best adventures are the ones you stumble into.", "storyTitle": "Ziggy's Running Gag", "teaser": "Bored of being \"just\" an iguanodon, Ziggy goes looking for excitement \u2014 and finds something he truly loves."}, "peppy_parasaurolophus": {"fact": "Peppy is a Parasaurolophus, known for its big curvy head crest. Its name means \"near crested lizard.\"", "moral": "Peppy learns that quiet and loud both have the right time and place.", "storyTitle": "Peppy Makes a Ruckus", "teaser": "Peppy's noisiness attracts a hungry T-rex to his herd's valley \u2014 can he fix the mess he made?"}, "tootles_triceratops": {"fact": "Tootles is a Triceratops, with a parrot-like beak and a three-foot frill. Her name means \"three-horned face.\"", "moral": "Tootles learns that caring about others is more important than looking good.", "storyTitle": "Tootles and Olly", "teaser": "Tootles gets stuck in the forest by her own giant horn \u2014 and it takes a brand-new friend to help her see what really matters."}, "skippy_spinosaurus": {"fact": "Skippy is a Spinosaurus, the largest meat-eating dinosaur ever known \u2014 even bigger than T-rex! Its name means \"spine lizard.\"", "moral": "Skippy learns that being creative and never giving up helps you grow.", "storyTitle": "Skippy's Food Fight", "teaser": "Skippy hates fish, so he tries eating plants instead \u2014 but it doesn't go quite as planned."}, "victor_velociraptor": {"fact": "Victor is a Velociraptor \u2014 about the size of a turkey, with a long tail, found in the Gobi Desert. His name means \"swift robber.\"", "moral": "Victor learns that facing your fears gives you more strength than running from them.", "storyTitle": "Sleepless in the Cretaceous", "teaser": "Victor's nightmares keep him from sleeping \u2014 until he learns that facing fear head-on changes everything."}, "gigi_giganotosaurus": {"fact": "Gigi is a Giganotosaurus, the longest meat-eating dinosaur ever discovered! Found in Argentina, her name means \"giant southern reptile.\"", "moral": "Gigi learns she can follow her heart without leaving the people she loves behind.", "storyTitle": "Giganotosaurus Can't Dance", "teaser": "Gigi loves to dance, but her earth-shaking moves keep scaring away her family's food!"}, "benny_brachiosaurus": {"fact": "Babs is a Brachiosaurus, a giant plant-eater whose name means \u201carm lizard\u201d because of her long front legs.", "moral": "Babs learns that what's inside matters far more than how you look.", "storyTitle": "Babs' Pain in the Neck", "teaser": "Tired of being teased about her neck, Babs runs away \u2014 and learns the most important part of her is her heart."}, "artie_apatosaurus": {"fact": "Patsy is an Apatosaurus, one of the biggest herbivores ever \u2014 weighing about 45 tons! Her name means \"deceptive lizard.\"", "moral": "Patsy learns that being brave means standing up for the people you love.", "storyTitle": "A Dino Double Feature: A Bone-thrilling Dinosaur Tale", "teaser": "Patsy must think fast to save herself and her wisecracking friend from becoming a prehistoric dino-dinner!"}};

// Maps each dino index -> the level id that unlocks it in the Dino-Dex (first level it appears in)
const DINO_UNLOCK_LEVEL = {};
LEVELS.forEach(lvl => {
  lvl.dinoSet.forEach(dinoIdx => {
    if (dinoIdx < 12 && !(dinoIdx in DINO_UNLOCK_LEVEL)) { // only real dinos, not egg/bone
      DINO_UNLOCK_LEVEL[dinoIdx] = lvl.id;
    }
  });
});
function isDinoUnlocked(dinoIdx) {
  const reqLevel = DINO_UNLOCK_LEVEL[dinoIdx];
  if (reqLevel === undefined) return true; // egg/bone always "unlocked" visually
  return !!scores[reqLevel];
}

function imgSrc(dinoIdx) { return DINO_IMAGES[DINOS[dinoIdx].key]; }
function loadScores() {
  try { scores = JSON.parse(localStorage.getItem('dks3m_scores_v3') || '{}'); } catch(e) { scores = {}; }
}
function saveScores() {
  try { localStorage.setItem('dks3m_scores_v3', JSON.stringify(scores)); } catch(e) {}
}
function clearScores() {
  scores = {};
  try { localStorage.removeItem('dks3m_scores_v3'); } catch(e) {}
  renderTitle();
}
function recordScore(lvl, sc, stars) {
  const prev = scores[lvl] || { score:0, stars:0 };
  scores[lvl] = { score: Math.max(prev.score, sc), stars: Math.max(prev.stars, stars) };
  saveScores();
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goHome() {
  if (pendingUnlocks.length > 0) { showNextUnlock(); return; }
  renderTitle(); showScreen('title-screen');
}
function getNextLevel() {
  for (let l of LEVELS) if (!scores[l.id]) return l.id;
  return LEVELS[LEVELS.length-1].id;
}
function nextLevel() {
  if (pendingUnlocks.length > 0) { showNextUnlock(); return; }
  const idx = LEVELS.findIndex(l => l.id === currentLevel.id);
  if (idx < LEVELS.length - 1) startLevel(LEVELS[idx+1].id);
  else goHome();
}
function showNextUnlock() {

  const story = DINO_STORY[d.key];
  document.getElementById('unlock-img').src = DINO_IMAGES[d.key];
  document.getElementById('unlock-name').textContent = d.full;
  document.getElementById('unlock-moral').textContent = story ? story.moral : '';
  document.getElementById('unlock-overlay').style.display = 'flex';
}
function closeUnlock() {
  document.getElementById('unlock-overlay').style.display = 'none';
  if (pendingUnlocks.length > 0) { showNextUnlock(); return; }
  renderTitle(); showScreen('title-screen');
}
function showDexDetail(dinoIdx) {
  const d = DINOS[dinoIdx];
  const story = DINO_STORY[d.key];
  document.getElementById('dex-detail-img').src = DINO_IMAGES[d.key];
  document.getElementById('dex-detail-name').textContent = d.full;
  document.getElementById('dex-detail-period').textContent = d.period + ' Period';
  document.getElementById('dex-detail-fact').textContent = story ? story.fact : '';
  document.getElementById('dex-detail-moral').textContent = story ? story.moral : '';
  document.getElementById('dex-detail-storytitle').textContent = story ? story.storyTitle : '';
  document.getElementById('dex-detail-teaser').textContent = story ? story.teaser : '';
  document.getElementById('dex-detail-overlay').style.display = 'flex';
}
function closeDexDetail() {
  document.getElementById('dex-detail-overlay').style.display = 'none';
}
function renderTitle() {
  loadScores();
  const parade = document.getElementById('parade');
  parade.innerHTML = DINOS.map(d => `<img src="${DINO_IMAGES[d.key]}" title="${d.full}">`).join('');
  const lg = document.getElementById('level-grid');
  lg.innerHTML = '';
  LEVELS.forEach(lvl => {
    const s = scores[lvl.id];
    const unlocked = lvl.id === 1 || scores[lvl.id - 1];
    const stars = s ? s.stars : 0;
    const starStr = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
    const btn = document.createElement('div');
    btn.className = 'level-btn' + (unlocked ? '' : ' locked');
    btn.innerHTML = `<div class="lnum">L${lvl.id}</div>
      <div class="lgoal">${lvl.name}</div>
      <div class="lstar">${unlocked ? starStr : '🔒'}</div>
      ${s ? `<div class="lgoal" style="color:#ffd166">${s.score}</div>` : ''}`;
    if (unlocked) btn.onclick = () => startLevel(lvl.id);
    lg.appendChild(btn);
  });
  const dex = document.getElementById('dex-grid');
  dex.innerHTML = DINOS.map((d, i) => {
    const unlocked = isDinoUnlocked(i);
    if (unlocked) {
      return `<div class="dex-card unlocked" onclick="showDexDetail(${i})">
        <img src="${DINO_IMAGES[d.key]}">
        <div class="dex-name">${d.name}</div>
        <div class="dex-period">${d.period}</div>
      </div>`;
    } else {
      return `<div class="dex-card locked">
        <div class="dex-silhouette">❓</div>
        <div class="dex-name">???</div>
        <div class="dex-period">L${DINO_UNLOCK_LEVEL[i]} to unlock</div>
      </div>`;
    }
  }).join('');
  const lb = document.getElementById('lb-list');
  const allScores = Object.entries(scores)
    .map(([id, v]) => ({ level: LEVELS.find(l=>l.id==id)?.name || `Level ${id}`, score: v.score, stars: v.stars }))
    .sort((a,b) => b.score - a.score)
    .slice(0, 5);
  if (allScores.length === 0) {
    lb.innerHTML = '<div class="lb-empty">No scores yet — start playing!</div>';
  } else {
    lb.innerHTML = allScores.map((e,i) =>
      `<div class="lb-row">
        <div class="lb-rank">${['🥇','🥈','🥉','4','5'][i]}</div>
        <div class="lb-name">${e.level}</div>
        <div>${'⭐'.repeat(e.stars)}</div>
        <div class="lb-score">${e.score}</div>
      </div>`).join('');
  }
}
function startLevel(id) {
  currentLevel = LEVELS.find(l => l.id === id);
  GRID = currentLevel.grid;
  levelDinoSet = currentLevel.dinoSet;
  score = 0; moves = currentLevel.moves; busy = false; selected = null; hintCells = [];
  activePU = null; powerups = { bomb:2, meteor:1, fossil:1 };
  goalProgress = currentLevel.goals.map(g => ({ ...g, collected: 0 }));
  levelComplete = false;
  document.getElementById('period-banner').textContent = `⏳ ${currentLevel.period} Period — ${currentLevel.name}`;
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('board').style.gridTemplateColumns = `repeat(${GRID}, 1fr)`;
  do { board = createBoard(); } while (!hasMoves());
  updateHUD(); renderGoals(); renderPowerups(); renderBoard();
  setMsg(`Level ${currentLevel.id}: ${currentLevel.name}!`);
  showScreen('game-screen');
}
function randDino() { return levelDinoSet[Math.floor(Math.random()*levelDinoSet.length)]; }
function createBoard() {
  let b = [];
  for (let r = 0; r < GRID; r++) {
    b[r] = [];
    for (let c = 0; c < GRID; c++) {
      let val;
      do { val = randDino(); }
      while (
        (c >= 2 && b[r][c-1] === val && b[r][c-2] === val) ||
        (r >= 2 && b[r-1]?.[c] === val && b[r-2]?.[c] === val)
      );
      b[r][c] = val;
    }
  }
  return b;
}
function renderBoard() {
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < GRID; r++) {
    for (let c = 0; c < GRID; c++) {
      const v = board[r][c];
      const cell = document.createElement('div');
      cell.className = `cell`;
      cell.id = `cell-${r}-${c}`;
      cell.innerHTML = `<img src="${imgSrc(v)}" draggable="false">`;
      if (selected && selected[0]===r && selected[1]===c) cell.classList.add('selected');
      if (activePU) cell.style.cursor = 'crosshair';
      cell.addEventListener('click', () => onCellClick(r, c));
      boardEl.appendChild(cell);
    }
  }
}
function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-moves').textContent = moves;
}
function renderGoals() {
  const el = document.getElementById('goal-items');
  el.innerHTML = goalProgress.map(g => {
    const done = g.collected >= g.count;
    return `<div class="goal-item ${done?'done':''}">
      <img src="${imgSrc(g.dino)}">
      <span class="gi-count">${Math.min(g.collected,g.count)}/${g.count}</span>
      ${done ? '✅' : ''}
    </div>`;
  }).join('');
}
function renderPowerups() {
  document.getElementById('pu-bomb-count').textContent = powerups.bomb;
  document.getElementById('pu-meteor-count').textContent = powerups.meteor;
  document.getElementById('pu-fossil-count').textContent = powerups.fossil;
  ['bomb','meteor','fossil'].forEach(p => {
    document.getElementById(`pu-${p}-btn`).classList.toggle('active', activePU === p);
  });
}
function setMsg(m) { document.getElementById('msg-bar').textContent = m; }
function activatePowerup(type) {
  if (busy) return;
  if (powerups[type] <= 0) { setMsg(`No ${type}s left!`); return; }
  activePU = activePU === type ? null : type;
  renderPowerups();
  if (activePU === 'bomb')   setMsg('💣 Click a tile to EXPLODE it!');
  if (activePU === 'meteor') setMsg('🌋 Click to erupt an entire ROW!');
  if (activePU === 'fossil') setMsg('⚡ Click to clear all of that dino!');
  if (!activePU) setMsg('Powerup cancelled.');
}
function onCellClick(r, c) {
  if (busy) return;
  clearHint();
  if (activePU) {
    usePowerup(activePU, r, c);
    return;
  }
  if (!selected) { selected = [r, c]; renderBoard(); return; }
  const [sr, sc] = selected;
  if (sr === r && sc === c) { selected = null; renderBoard(); return; }
  const dr = Math.abs(r-sr), dc = Math.abs(c-sc);
  if ((dr===1&&dc===0)||(dr===0&&dc===1)) { selected = null; renderBoard(); doSwap(sr,sc,r,c); }
  else { selected = [r,c]; renderBoard(); }
}
function usePowerup(type, r, c) {
  powerups[type]--;
  activePU = null;
  renderPowerups();
  busy = true;
  let toRemove = [];
  if (type === 'bomb') {
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      const nr=r+dr, nc=c+dc;
      if (nr>=0&&nr<GRID&&nc>=0&&nc<GRID) toRemove.push([nr,nc]);
    }
    setMsg('💥 BOOM!');
  } else if (type === 'meteor') {
    for (let col=0; col<GRID; col++) toRemove.push([r,col]);
    setMsg('🌋 Volcano Strike!');
  } else if (type === 'fossil') {
    const target = board[r][c];
    for (let rr=0; rr<GRID; rr++) for (let cc=0; cc<GRID; cc++)
      if (board[rr][cc]===target) toRemove.push([rr,cc]);
    setMsg(`⚡ All ${DINOS[target].name}s cleared!`);
  }
  animateAndRemove(toRemove);
}
function doSwap(r1,c1,r2,c2) {
  busy = true;
  swap(r1,c1,r2,c2);
  const matches = findMatches();
  if (!matches.length) { swap(r1,c1,r2,c2); renderBoard(); setMsg(`No match! Try again 🦕`); busy=false; return; }
  moves--; updateHUD();
  processMatches(matches);
}
function swap(r1,c1,r2,c2) { [board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]]; }
function findMatches() {
  const matched = new Set();
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID-2;c++) {
    if (board[r][c]===board[r][c+1]&&board[r][c]===board[r][c+2]) {
      let len=3; while(c+len<GRID&&board[r][c]===board[r][c+len])len++;
      for(let i=0;i<len;i++) matched.add(`${r},${c+i}`);
    }
  }
  for (let c=0;c<GRID;c++) for (let r=0;r<GRID-2;r++) {
    if (board[r][c]===board[r+1][c]&&board[r][c]===board[r+2][c]) {
      let len=3; while(r+len<GRID&&board[r+len]?.[c]===board[r][c])len++;
      for(let i=0;i<len;i++) matched.add(`${r+i},${c}`);
    }
  }
  return [...matched].map(k=>k.split(',').map(Number));
}
function processMatches(matches) {
  renderBoard();
  matches.forEach(([r,c]) => { const el=document.getElementById(`cell-${r}-${c}`); if(el) el.classList.add('matched'); });
  const pts = matches.length * 50 + (matches.length > 4 ? (matches.length-4)*100 : 0);
  score += pts;
  matches.forEach(([r,c]) => {
    const v = board[r][c];
    goalProgress.forEach(g => { if(g.dino===v && g.collected<g.count) g.collected++; });
  });
  const sampleDino = DINOS[board[matches[0][0]][matches[0][1]]].name;
  const msgs = [
    `Roar! 🦖 +${pts}`, `${sampleDino} Smash! +${pts}`,
    `Prehistoric Combo! +${pts}`, `Jurassic! +${pts}`, `Dino Kids Smash! +${pts}`
  ];
  setMsg(msgs[Math.floor(Math.random()*msgs.length)]);
  updateHUD(); renderGoals();
  setTimeout(() => {
    matches.forEach(([r,c]) => board[r][c] = -1);
    gravity(); refill(); renderBoard(); addFallAnim();
    setTimeout(() => {
      const nm = findMatches();
      if (nm.length) { processMatches(nm); return; }
      busy = false;
      checkWin();
      if (!levelComplete && moves <= 0) { showGameOver(); return; }
      if (!levelComplete && !hasMoves()) { setMsg('No moves! Shuffling 🔀'); shuffleBoard(); }
    }, 280);
  }, 380);
}
function animateAndRemove(cells) {
  renderBoard();
  cells.forEach(([r,c]) => { const el=document.getElementById(`cell-${r}-${c}`); if(el) el.classList.add('matched'); });
  const pts = cells.length * 60;
  score += pts; updateHUD();
  cells.forEach(([r,c]) => {
    const v=board[r][c];
    goalProgress.forEach(g=>{ if(g.dino===v&&g.collected<g.count) g.collected++; });
  });
  renderGoals();
  setTimeout(() => {
    cells.forEach(([r,c]) => board[r][c]=-1);
    gravity(); refill(); renderBoard(); addFallAnim();
    setTimeout(() => {
      const nm=findMatches();
      if(nm.length){processMatches(nm);return;}
      busy=false;
      checkWin();
      if(!levelComplete&&moves<=0){showGameOver();return;}
      if(!levelComplete&&!hasMoves()){setMsg('No moves! Shuffling 🔀');shuffleBoard();}
    },280);
  },400);
}
function gravity() {
  for(let c=0;c<GRID;c++){
    let e=GRID-1;
    for(let r=GRID-1;r>=0;r--) if(board[r][c]!==-1){board[e][c]=board[r][c];if(e!==r)board[r][c]=-1;e--;}
    for(let r=e;r>=0;r--) board[r][c]=-1;
  }
}
function refill() {
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++) if(board[r][c]===-1) board[r][c]=randDino();
}
function addFallAnim() {
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    const el=document.getElementById(`cell-${r}-${c}`);
    if(el){el.classList.remove('matched','falling');void el.offsetWidth;el.classList.add('falling');setTimeout(()=>el.classList.remove('falling'),250);}
  }
}
function hasMoves() {
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    if(c<GRID-1){swap(r,c,r,c+1);if(findMatches().length){swap(r,c,r,c+1);return true;}swap(r,c,r,c+1);}
    if(r<GRID-1){swap(r,c,r+1,c);if(findMatches().length){swap(r,c,r+1,c);return true;}swap(r,c,r+1,c);}
  }
  return false;
}
function showHint() {
  if(busy)return; clearHint();
  for(let r=0;r<GRID;r++) for(let c=0;c<GRID;c++){
    const pairs=[[r,c,r,c+1],[r,c,r+1,c]];
    for(const [r1,c1,r2,c2] of pairs){
      if(r2>=GRID||c2>=GRID)continue;
      swap(r1,c1,r2,c2);
      if(findMatches().length){swap(r1,c1,r2,c2);hintCells=[[r1,c1],[r2,c2]];hintCells.forEach(([hr,hc])=>{const el=document.getElementById(`cell-${hr}-${hc}`);if(el)el.classList.add('hint-glow');});setMsg('Swap the glowing dinos! ✨');return;}
      swap(r1,c1,r2,c2);
    }
  }
}
function clearHint(){hintCells.forEach(([r,c])=>{const el=document.getElementById(`cell-${r}-${c}`);if(el)el.classList.remove('hint-glow');});hintCells=[];}
function shuffleBoard() {
  if(busy)return;
  do{for(let r=0;r<GRID;r++) for(let c=GRID-1;c>0;c--){const j=Math.floor(Math.random()*(c+1));[board[r][c],board[r][j]]=[board[r][j],board[r][c]];}}
  while(!hasMoves());
  renderBoard(); setMsg('Board shuffled! 🔀');
}
function calcStars() {
  const allDone = goalProgress.every(g => g.collected >= g.count);
  if (!allDone) return 0;
  const movesLeft = moves;
  if (movesLeft >= Math.ceil(currentLevel.moves * 0.5)) return 3;
  if (movesLeft >= Math.ceil(currentLevel.moves * 0.2)) return 2;
  return 1;
}
function checkWin() {
  if (levelComplete) return;
  const allDone = goalProgress.every(g => g.collected >= g.count);
  if (!allDone) return;
  levelComplete = true;
  const stars = calcStars();
  const bonus = moves * 100;
  score += bonus;

  // Determine which dinos get newly unlocked by completing this level (before saving the score)
  const newlyUnlocked = Object.entries(DINO_UNLOCK_LEVEL)
    .filter(([dinoIdx, reqLevel]) => reqLevel === currentLevel.id && !scores[reqLevel])
    .map(([dinoIdx]) => parseInt(dinoIdx));

  recordScore(currentLevel.id, score, stars);
  pendingUnlocks = newlyUnlocked;
  updateHUD();
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-dino-img').src = imgSrc(goalProgress[0].dino);
  document.getElementById('overlay-title').textContent = stars===3 ? '🎉 Perfect!' : stars===2 ? '🌟 Great Job!' : '✅ Level Clear!';
  document.getElementById('overlay-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('overlay-sub').textContent = `Score: ${score}  |  +${bonus} move bonus!`;

  // Show a moral/lesson line from one of this level's real dino characters (skip egg/bone)
  const storyDinoGoal = goalProgress.find(g => g.dino < 12 && DINO_STORY[DINOS[g.dino].key]);
  const moralEl = document.getElementById('overlay-moral');
  if (storyDinoGoal) {
    const story = DINO_STORY[DINOS[storyDinoGoal.dino].key];
    moralEl.textContent = `"${story.moral}"`;
  } else {
    moralEl.textContent = '';
  }

  const nextIdx = LEVELS.findIndex(l=>l.id===currentLevel.id);
  document.getElementById('overlay-next-btn').style.display = nextIdx < LEVELS.length-1 ? '' : 'none';
  ov.style.display = 'flex';
}
function showGameOver() {
  levelComplete = true;
  recordScore(currentLevel.id, score, 0);
  const ov = document.getElementById('overlay');
  document.getElementById('overlay-dino-img').src = imgSrc(levelDinoSet[0]);
  document.getElementById('overlay-title').textContent = '😢 Out of Moves!';
  document.getElementById('overlay-stars').textContent = '☆☆☆';
  document.getElementById('overlay-sub').textContent = `Score: ${score} — Try again?`;
  document.getElementById('overlay-moral').textContent = '';
  document.getElementById('overlay-next-btn').style.display = 'none';
  ov.style.display = 'flex';
}
loadScores();
renderTitle();
</script>
